ai_usage_summary: |
  AI tools were used as development assistants during the implementation of this
  project, helping accelerate prototyping and code generation for selected
  components. The overall system was engineered, integrated, adapted, and
  validated through human decision-making. The final pipeline, local deployment
  strategy, scoring configuration, guardrail implementation, ranking heuristics,
  disqualifier rules, honeypot logic, and job-description query formulation were
  reviewed, refined, and approved by the project authors. The completed system
  operates entirely on local compute for candidate ranking, with no candidate
  data transmitted to hosted LLMs or external inference APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  This project implements a fully local, multi-stage Retrieval-Augmented Ranking
  (RAG) pipeline designed to satisfy the competition's privacy, reproducibility,
  and resource constraints.

  Phase 1 - Profile Processing & Feature Engineering. Candidate profiles are
  transformed into career-weighted documents that prioritize long-term
  professional experience while extracting structured evaluation signals
  including role alignment, career evidence, trusted skill relevance, experience
  progression, ranking-evaluation literacy, and product-company experience.
  Additional heuristics apply bounded penalties for predefined edge cases, while
  a consistency gate identifies logically contradictory profiles.

  Phase 2 - Hybrid Retrieval. Candidate profiles are indexed using both semantic
  and lexical retrieval. Dense retrieval is performed using local embeddings
  (BAAI/bge-small-en-v1.5 when available), while BM25 provides complementary
  lexical matching over the same corpus. For the submitted artifacts, a
  deterministic hashing encoder was used to generate the shipped index to
  maintain reproducibility within the available offline build budget. The
  production embedding pipeline remains fully implemented and validated. Semantic
  and lexical scores are min-max normalized over the pool and blended into a
  single hybrid similarity score.

  Phase 3 - Composite Candidate Scoring. Structured evaluation signals and hybrid
  retrieval scores are combined into a unified recruiter-fit score. Additional
  multiplicative gating factors incorporate role evidence, candidate
  availability, and profile consistency, ensuring ranking decisions reflect
  multiple independent evaluation signals rather than keyword matching alone.

  Phase 4 - Cross-Encoder Refinement. The highest-ranked shortlist is
  re-evaluated using a local cross-encoder (ms-marco-MiniLM-L-6-v2), enabling
  deeper interaction between the job description and each candidate profile. This
  second-stage reranking improves precision among the strongest candidates while
  remaining entirely offline.

  Candidate explanations are generated deterministically from structured profile
  data rather than by a language model, ensuring explanations remain reproducible
  and grounded in observable profile information.

  The complete ranking pipeline executes locally, processing a 100K-candidate
  dataset on CPU hardware with prebuilt artifacts while remaining within the
  competition's memory constraints. When pretrained models are unavailable, the
  system automatically falls back to a deterministic hashing encoder and
  in-memory BM25 implementation, preserving reproducibility and offline execution
  without altering the overall ranking workflow.

